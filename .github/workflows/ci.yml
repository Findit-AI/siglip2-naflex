name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule: 
    - cron: "0 1 1 * *"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  # Check formatting (platform-independent, one OS is enough)
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      run: rustup update stable && rustup default stable && rustup component add rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  # Apply clippy lints
  clippy:
    name: clippy
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
    - name: Install cargo-hack
      run: cargo install cargo-hack
    - name: Apply clippy lints
      run: cargo hack clippy --each-feature --exclude-no-default-features

  # Cross-build the inference-free subset of the crate against a wide
  # arch matrix. This is a portability gate for the preprocessing /
  # similarity / SIMD / embedding code, NOT an ORT integration test.
  #
  # Default features pull `ort` and `tokenizers`. The `ort-sys` prebuilt
  # distribution table only lists a small subset of these triples
  # (essentially `{x86_64,aarch64}-unknown-linux-gnu`,
  # `{x86_64,aarch64}-apple-darwin`, `{x86_64,aarch64}-pc-windows-msvc`),
  # and `tokenizers` pulls C/C++ deps (`onig_sys`, `esaxx-rs`) that
  # require a target-specific cross-toolchain. Building default features
  # against most of this matrix fails at the ort-sys build script or the
  # C/C++ link step.
  #
  # Default-feature builds are validated on the three host platforms
  # (ubuntu/macos/windows-latest) by the `build`, `test`, and `clippy`
  # jobs — those runners are themselves on ORT-supported triples and
  # use native toolchains. Wasm targets are handled by the dedicated
  # `wasm` and `wasm-simd128-runtime` jobs.
  #
  # Codex round-27 finding [high] (cross matrix using default features
  # on targets ort cannot support).
  cross:
    name: cross
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
          - aarch64-unknown-linux-musl
          - i686-linux-android
          - x86_64-linux-android
          - i686-pc-windows-gnu
          - x86_64-pc-windows-gnu
          - i686-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          # wasm32 targets are handled by the dedicated `wasm` job below —
          # they need their own runtime tests, not just `cargo build`.
          # Codex round-20 finding [high].
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cross-
      - name: Install Rust
        run: rustup update stable && rustup default stable
      # `--no-default-features --features serde` skips `inference`
      # (ort + tokenizers) and `decoders` (image/jpeg, image/png).
      # `--lib` keeps cargo from trying to link example/test executables
      # for the cross target (which would need a target-specific C
      # linker we don't install here). The lib output is rlib-only.
      - name: cargo build --target ${{ matrix.target }} (no-default-features)
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --lib --target ${{ matrix.target }} --no-default-features --features serde

  # AVX-512 correctness via Intel SDE (Software Development Emulator).
  # Free GH runners are AMD EPYC Milan (no AVX-512), so the AVX-512
  # backend tests in `src/simd/arch/x86_avx512.rs` self-skip via
  # `is_x86_feature_detected!("avx512f")`. Without this job, a
  # reduction-or-load mistake in the unsafe AVX-512 path would only
  # surface on production AVX-512 hosts (Sapphire Rapids, Zen 4, etc.).
  # SDE emulates the AVX-512 ISA in software so the dispatcher picks
  # the AVX-512 path under emulation and the in-file unit tests run.
  # Codex round-20 finding [medium].
  avx512-sde:
    name: AVX-512 (Intel SDE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-sde-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sde-
      - name: Install Intel SDE
        run: |
          # Pinned tarball from the public Intel mirror. Update the URL
          # when bumping SDE — newer versions add coverage for newer
          # CPU families. The `-future` flag we pass at runtime picks
          # the widest emulated feature set this SDE knows.
          SDE_URL="https://downloadmirror.intel.com/843185/sde-external-9.48.0-2024-11-25-lin.tar.xz"
          wget -q "$SDE_URL" -O sde.tar.xz
          mkdir -p sde
          tar -xf sde.tar.xz -C sde --strip-components=1
          echo "$PWD/sde" >> "$GITHUB_PATH"
      - name: Verify SDE installed
        run: sde64 -version
      - name: Run AVX-512 SIMD tests under SDE
        env:
          # SDE emulates execution only, so wrap the test runner via
          # cargo's per-target runner env var. `-future` selects the
          # widest emulated CPU (currently Sierra Forest / Granite
          # Rapids — covers AVX-512F + BW + VL + DQ, which more than
          # covers our `avx512f`-only kernels).
          #
          # Slowdown vs native: ~10-50× depending on workload. For a
          # ~50-line dot product kernel the absolute time is still
          # under a minute.
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: "sde64 -future --"
        run: |
          cargo test \
            --all-features \
            --lib \
            --target x86_64-unknown-linux-gnu \
            simd::arch::x86_avx512

  # Dedicated wasm32 job. Builds the no-inference subset of the crate
  # (preprocessing + similarity + SIMD) which IS wasm-buildable, and
  # exercises both with and without `simd128` to prove the dispatcher's
  # wasm branch and scalar fallback both compile cleanly.
  # Codex round-20 finding [high].
  wasm:
    name: wasm32-${{ matrix.target }}-${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: wasm32-unknown-unknown
            label: scalar
            rustflags: '-Dwarnings'
          - target: wasm32-unknown-unknown
            label: simd128
            rustflags: '-Dwarnings -C target-feature=+simd128'
          - target: wasm32-wasip1
            label: scalar
            rustflags: '-Dwarnings'
          - target: wasm32-wasip1
            label: simd128
            rustflags: '-Dwarnings -C target-feature=+simd128'
    runs-on: ubuntu-latest
    # Per-job `RUSTFLAGS` REPLACES the workflow-level one (it's not
    # appended). Re-include `-Dwarnings` from the top-level env in
    # every matrix entry so warnings still fail the wasm build.
    # Codex CI sweep (round 27).
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ matrix.target }}-${{ matrix.label }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-${{ matrix.target }}-
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: cargo check --target ${{ matrix.target }}
        run: |
          rustup target add ${{ matrix.target }}
          # `--no-default-features` skips `inference` (ort + tokenizers)
          # but keeps `serde` available so consumers can opt in. The
          # `decoders` feature is omitted because JPEG/PNG decoding
          # isn't a typical wasm use case for this subset; callers
          # supply already-decoded RGB via `ImageView::new`.
          cargo check --lib --target ${{ matrix.target }} --no-default-features --features serde

  # Wasm simd128 scalar-parity tests under wasmtime. The `wasm` job
  # above only compiles the simd128 backend; this job actually runs
  # the kernels and asserts each one matches the scalar oracle on a
  # batch of deterministic inputs. Without this, a lane-order /
  # reduction / widening-conversion bug in the unsafe `v128_load`
  # path would ship undetected to wasm consumers. Mirrors the SDE
  # pattern we use for AVX-512. Codex round-24 finding [medium].
  wasm-simd128-runtime:
    name: wasm32 simd128 runtime tests (wasmtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update stable && rustup default stable && rustup target add wasm32-wasip1
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasmtime-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasmtime-
      - name: Install wasmtime
        run: |
          # Pinned tarball from Bytecode Alliance's GitHub releases.
          # wasmtime 25.x supports simd128 natively; bump together
          # with the pin in `target.wasm32-wasip1.runner` if you
          # want to test newer simd extensions later.
          WT_VERSION="v25.0.3"
          WT_URL="https://github.com/bytecodealliance/wasmtime/releases/download/${WT_VERSION}/wasmtime-${WT_VERSION}-x86_64-linux.tar.xz"
          curl -L -f "$WT_URL" -o wasmtime.tar.xz
          mkdir -p wasmtime
          tar -xf wasmtime.tar.xz -C wasmtime --strip-components=1
          echo "$PWD/wasmtime" >> "$GITHUB_PATH"
      - name: Verify wasmtime
        run: wasmtime --version
      - name: Run wasm simd128 SIMD tests under wasmtime
        env:
          # Wasmtime-as-cargo-runner: any test binary built for
          # wasm32-wasip1 will be invoked via `wasmtime <binary>`.
          # Standard cargo idiom; same shape as the SDE runner config
          # for AVX-512.
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime"
          # Enable simd128 in the codegen so the wasm_simd128 backend
          # actually compiles its intrinsics (otherwise the file
          # type-checks but the `#[target_feature(enable = "simd128")]`
          # functions emit unreachable). The wasm32-wasip1 target's
          # default feature set does NOT include simd128.
          # `-Dwarnings` re-included because step-level env REPLACES
          # the workflow-level `RUSTFLAGS: -Dwarnings`. Codex CI sweep.
          RUSTFLAGS: "-Dwarnings -C target-feature=+simd128"
        run: |
          cargo test \
            --target wasm32-wasip1 \
            --no-default-features \
            --features serde \
            --lib \
            simd

  build:
    name: build
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Cache cargo build and registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-build-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Install cargo-hack
      run: cargo install cargo-hack
    - name: Run build
      run: cargo hack build --each-feature --exclude-no-default-features

  test:
    name: test
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Cache cargo build and registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-test-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Install cargo-hack
      run: cargo install cargo-hack
    # Linux/macOS: full feature-powerset, including the `inference`
    # combinations (ort + tokenizers).
    - name: Run test (Linux/macOS)
      if: runner.os != 'Windows'
      run: cargo hack test --each-feature --exclude-no-default-features
    # Windows: skip every combination that pulls `inference`. ORT's
    # prebuilt binary on `x86_64-pc-windows-msvc` is linked against the
    # dynamic CRT (`/MD`), but the C/C++ build scripts in `tokenizers`
    # deps (`onig_sys`, `esaxx-rs`) link the static CRT (`/MT`). When
    # both end up in the same test executable, MSVC errors `LNK2038`
    # ("RuntimeLibrary mismatch") and the link aborts.
    #
    # The exclusion list is exhaustive: every feature whose definition
    # contains `"inference"` must be listed. That's `inference` itself,
    # `bundled` (= `["inference"]`), `default`
    # (= `["inference", "bundled", "decoders"]`), and the five
    # execution-provider features (each defined as
    # `"feature" = ["inference", "ort/<feature>"]`). Missing any one of
    # them lets `cargo hack --each-feature` build that single combo
    # which re-introduces the conflict pair.
    #
    # This is a pre-existing dependency-ecosystem mismatch, not
    # something this crate can resolve by changing its own code or
    # build script. The `inference` path is exercised on Linux/macOS
    # via the `test` job above and via the parity workflow on the
    # release model. The `build` and `clippy` jobs still compile the
    # crate end-to-end on Windows, which catches the lib-level
    # regressions a test binary would.
    - name: Run test (Windows — skip inference due to MSVC CRT conflict)
      if: runner.os == 'Windows'
      run: cargo hack test --each-feature --exclude-no-default-features --exclude-features inference,bundled,default,cuda,tensorrt,directml,rocm,coreml

  sanitizer:
    name: sanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-sanitizer-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sanitizer-
      - name: Install Rust
        run: rustup update nightly && rustup default nightly
      - name: Install rust-src
        run: rustup component add rust-src
      - name: ASAN / LSAN / MSAN / TSAN
        run: bash ci/sanitizer.sh

  miri-tb:
    name: miri-tb-${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: powerpc64-unknown-linux-gnu
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-
      - name: Miri
        run: |
          bash ci/miri_tb.sh "${{ matrix.target }}"

  miri-sb:
    name: miri-sb-${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: powerpc64-unknown-linux-gnu
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-
      - name: Miri
        run: |
          bash ci/miri_sb.sh "${{ matrix.target }}"

