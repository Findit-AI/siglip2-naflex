name: Benchmarks

on:
  push:
    branches:
      - main
    paths:
      - 'benches/**'
      - 'src/**'
      - 'Cargo.toml'
      - '.github/workflows/benchmark.yml'
  pull_request:
    paths:
      - 'benches/**'
      - 'src/**'
      - 'Cargo.toml'
      - '.github/workflows/benchmark.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# `contents: read` is sufficient — Criterion artifacts are downloaded
# from the workflow run page; the workflow does not comment on PRs.
permissions:
  contents: read

jobs:
  benchmark:
    name: ${{ matrix.label }}
    strategy:
      # Each tier is independent — keep the others running if one fails.
      fail-fast: false
      matrix:
        include:
          # aarch64 NEON — runtime dispatcher picks NEON. The tightest
          # SIMD path for `dot_768` and `normalize_patchify_row` on
          # Apple Silicon and ARM servers.
          - os: macos-latest
            arch: aarch64
            tier: neon
            rustflags: ''
            label: macos-aarch64-neon

          # aarch64 with NEON short-circuited via `siglip2_force_scalar`:
          # gives a scalar baseline on the same Apple-Silicon hardware so
          # speedup numbers are directly comparable to the NEON tier above.
          - os: macos-latest
            arch: aarch64
            tier: scalar
            rustflags: '--cfg siglip2_force_scalar'
            label: macos-aarch64-scalar

          # x86_64 default — runtime dispatcher picks whichever x86 tier
          # the runner supports. Standard ubuntu-latest is AMD EPYC 7763
          # (Milan) which has AVX2 + FMA but NOT AVX-512, so this tier
          # ends up exercising the AVX2 kernel. AVX-512 numbers from
          # GitHub-hosted runners would have to come from a self-hosted
          # Intel Sapphire Rapids / Zen 4 machine — out of scope here.
          - os: ubuntu-latest
            arch: x86_64
            tier: default
            rustflags: ''
            label: ubuntu-x86_64-default

          # x86_64 with AVX-512 disabled: forces the AVX2 dispatch
          # branch on runners that have AVX-512 (irrelevant on AMD
          # Milan, but explicit). Useful to pin a stable AVX2 number
          # in case someone re-runs this on a different runner family.
          - os: ubuntu-latest
            arch: x86_64
            tier: avx2-max
            rustflags: '--cfg siglip2_disable_avx512'
            label: ubuntu-x86_64-avx2-max

          # x86_64 with AVX-512 + AVX2 both disabled: forces the SSE2
          # dispatch branch. Every x86_64 CPU has SSE2 (it's part of
          # the base ISA), so this tier exercises the SSE2 kernel on
          # every runner.
          - os: ubuntu-latest
            arch: x86_64
            tier: sse2-max
            rustflags: '--cfg siglip2_disable_avx512 --cfg siglip2_disable_avx2'
            label: ubuntu-x86_64-sse2-max

          # x86_64 with every SIMD backend short-circuited: scalar-only
          # baseline.
          - os: ubuntu-latest
            arch: x86_64
            tier: scalar
            rustflags: '--cfg siglip2_force_scalar'
            label: ubuntu-x86_64-scalar

          # x86_64 with `-C target-cpu=native`: enables the runner's
          # full feature set for LLVM auto-vectorization of scalar paths
          # and maximum codegen quality for SIMD kernels.
          #
          # `native` uses `target_rustflags` (routed via the per-target
          # `CARGO_TARGET_*_RUSTFLAGS` env var) instead of the global
          # `RUSTFLAGS`. The global `RUSTFLAGS` applies to *every* rustc
          # invocation, including proc-macro dylibs built for the host
          # (`thiserror_impl`, `serde_derive`, etc.), which then get
          # codegen'd with host-CPU-specific instructions and SIGILL
          # when rustc loads them in a different execution context.
          # The per-target var scopes `-C target-cpu=native` to the
          # target crate only, so proc macros stay generic.
          - os: ubuntu-latest
            arch: x86_64
            tier: native
            rustflags: ''
            target_rustflags: '-C target-cpu=native'
            label: ubuntu-x86_64-native

          # Windows x86_64 — same dispatcher as Linux but validates the
          # MSVC toolchain handles the intrinsics-heavy modules.
          - os: windows-latest
            arch: x86_64
            tier: default
            rustflags: ''
            label: windows-x86_64-default

    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
      # Per-target rustflags: only affects compilation of crates built
      # for the named triple, never build-dependencies. The `native`
      # tier uses this instead of `RUSTFLAGS` to avoid SIGILL when
      # rustc loads host-compiled proc-macro dylibs that were
      # codegen'd with `target-cpu=native`. Empty for tiers that don't
      # opt in — cargo treats empty as unset.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ${{ matrix.target_rustflags || '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable

      - name: Print CPU info (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "=== /proc/cpuinfo (first flags line) ==="
          grep -m1 '^flags' /proc/cpuinfo || true
          echo "=== lscpu ==="
          lscpu || true

      - name: Print CPU info (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "=== sysctl machdep.cpu ==="
          sysctl machdep.cpu || true
          echo "=== uname -m ==="
          uname -m

      - name: Print CPU info (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-CimInstance Win32_Processor | Select-Object Name, Manufacturer, NumberOfCores, NumberOfLogicalProcessors | Format-List

      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ matrix.tier }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-bench-${{ matrix.tier }}-
            ${{ runner.os }}-bench-

      - name: Run benchmarks
        shell: bash
        # `--benches` limits cargo to the registered bench targets
        # (without it, `cargo bench` also runs the library's `#[test]`
        # harness in release mode). Uses Criterion's native output
        # format — full HTML report under `target/criterion/` is
        # uploaded separately below.
        #
        # The model-needing benches (`bench_image_encode`,
        # `bench_text_encode`) gracefully skip when SIGLIP2_MODELS_DIR
        # is unset, which it is here. They print a "skipping" line and
        # exit 0. If you want full encode bench numbers, set the env
        # var and check in the ONNX models on a self-hosted runner.
        run: cargo bench --benches | tee benchmark-all-${{ matrix.label }}.txt
        continue-on-error: false

      - name: Write run metadata
        shell: bash
        run: |
          meta="benchmark-metadata-${{ matrix.label }}.md"
          echo "# Benchmark metadata: ${{ matrix.label }}" > "$meta"
          echo "" >> "$meta"
          echo "- OS: ${{ matrix.os }}" >> "$meta"
          echo "- Arch: ${{ matrix.arch }}" >> "$meta"
          echo "- SIMD tier: ${{ matrix.tier }}" >> "$meta"
          echo "- Runner: ${{ runner.name }}" >> "$meta"
          echo "- Runner arch (GH): ${{ runner.arch }}" >> "$meta"
          echo "- RUSTFLAGS: \`${{ matrix.rustflags }}\`" >> "$meta"
          if [ -n "${{ matrix.target_rustflags || '' }}" ]; then
            echo "- CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: \`${{ matrix.target_rustflags || '' }}\`" >> "$meta"
          fi
          echo "- Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$meta"
          cat "$meta"

      - name: Create benchmark archive
        shell: bash
        run: |
          mkdir -p benchmark-results
          mv benchmark-*.txt benchmark-results/ 2>/dev/null || true
          mv benchmark-metadata-${{ matrix.label }}.md benchmark-results/ 2>/dev/null || true
          if [ -d "target/criterion" ]; then
            cp -r target/criterion benchmark-results/criterion-${{ matrix.label }} || true
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ matrix.label }}
          path: benchmark-results/
          retention-days: 90

      - name: Upload Criterion detailed results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: criterion-detailed-${{ matrix.label }}
          path: target/criterion/
          retention-days: 90
        continue-on-error: false

  # Aggregate results from all platforms and SIMD tiers.
  aggregate-results:
    name: Aggregate benchmark results
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v8
        with:
          path: all-results

      - name: Write combined index
        shell: bash
        run: |
          index="BENCHMARK_INDEX.md"
          echo "# Benchmark run: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" > "$index"
          echo "" >> "$index"
          echo "Raw Criterion output per matrix entry is under" >> "$index"
          echo "\`all-results/benchmark-results-<label>/\` (txt + HTML report)." >> "$index"
          echo "" >> "$index"

          for meta in all-results/benchmark-results-*/benchmark-metadata-*.md; do
            if [ -f "$meta" ]; then
              echo "" >> "$index"
              cat "$meta" >> "$index"
              echo "" >> "$index"
              echo "---" >> "$index"
            fi
          done

          cat "$index"

      - name: Upload combined results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-combined
          path: |
            BENCHMARK_INDEX.md
            all-results/
          retention-days: 90
