codecov:
  require_ci_to_pass: false

# Quoted because YAML treats `*` as an alias-reference sigil. The
# previous `- **benches/*` form crashed codecov's `safe_load` parser
# with "while scanning an alias / expected alphabetic or numeric
# character, but found '*'" and broke every upload job. The patterns
# are codecov's own glob syntax (path-relative, `**` = any depth).
ignore:
  - "**/benches/**"
  - "**/examples/**"
  - "**/tests/**"

coverage:
  status:
    project: # Overall project status
      default:
        target: auto
        if_not_found: success
        only_pulls: false
    patch: # Status for the patch in pull requests
      default:
        target: auto
        if_not_found: success
        only_pulls: true
    changes: false # Whether to comment on the coverage changes in pull requests

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: false
